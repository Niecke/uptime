name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and push
        run: |
          docker build -t europe-west3-docker.pkg.dev/niecke-it/niecke-it/uptime:latest \
                       -t europe-west3-docker.pkg.dev/niecke-it/niecke-it/uptime:${{ github.sha }} .
          docker push europe-west3-docker.pkg.dev/niecke-it/niecke-it/uptime:latest
          docker push europe-west3-docker.pkg.dev/niecke-it/niecke-it/uptime:${{ github.sha }}
